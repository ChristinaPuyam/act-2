<!DOCTYPE html>
<html>
<head>
    <title>AWS Student Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px #ccc; }
        input { display: block; width: 250px; margin: 10px auto; padding: 10px; }
        button { background: #ff9900; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Add Student</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="course" placeholder="Course">
        <button onclick="saveStudent()">Add to AWS</button>
        <p id="msg"></p>
    </div>

    <script>
        // YOUR EXACT PROD URL
        const API_URL = "https://pq7t5r5anf.execute-api.eu-north-1.amazonaws.com/prod/students";

        async function saveStudent() {
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value
            };

            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Success! Data sent to DynamoDB.");
                location.reload(); // Refreshes to show you want to add more
            } else {
                alert("Error! Check Lambda logs.");
            }
        }
    </script>
</body>
</html>
