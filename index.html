<!DOCTYPE html>
<html>
<head>
    <title>AWS Student Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px #ccc; width: 350px; vertical-align: top; margin: 10px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff9900; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 95%; }
        button:hover { background: #e68a00; }
        #studentList { text-align: left; margin-top: 20px; }
        .student-card { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <!-- SECTION 1: ADD STUDENT (Linked to addStudent Lambda) -->
    <div class="box">
        <h2>Add Student</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="course" placeholder="Course">
        <button onclick="saveStudent()">Add to AWS</button>
        <p id="msg"></p>
    </div>

    <!-- SECTION 2: VIEW STUDENTS (Linked to getStudents Lambda) -->
    <div class="box">
        <h2>Enrolled Students</h2>
        <button onclick="loadStudents()" style="background: #0073bb;">Refresh List</button>
        <div id="studentList">Loading...</div>
    </div>

    <script>
        // YOUR API GATEWAY URL
        const API_URL = "https://pq7t5r5anf.execute-api.eu-north-1.amazonaws.com/prod/students";

        // LINKED TO: getStudents Lambda
        async function loadStudents() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = "Refreshing...";

            try {
                // This 'fetch' performs a GET request by default
                const response = await fetch(API_URL); 
                const data = await response.json();

                if (data.length === 0) {
                    listDiv.innerHTML = "No students found.";
                } else {
                    // This creates the HTML for each student in the list
                    listDiv.innerHTML = data.map(s => `
                        <div class="student-card">
                            <strong>${s.name}</strong><br>
                            ${s.course} | <small>${s.email}</small>
                        </div>
                    `).join('');
                }
            } catch (err) {
                listDiv.innerHTML = "Error loading data.";
                console.error(err);
            }
        }

        // LINKED TO: addStudent Lambda
        async function saveStudent() {
            const nameField = document.getElementById('name');
            const emailField = document.getElementById('email');
            const courseField = document.getElementById('course');

            const data = {
                name: nameField.value,
                email: emailField.value,
                course: courseField.value
            };

            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Success! Student saved to DynamoDB.");
                // Clear the input boxes
                nameField.value = ""; emailField.value = ""; courseField.value = "";
                // Automatically refresh the list
                loadStudents(); 
            } else {
                alert("Error saving student.");
            }
        }

        // Automatically load students when the page opens
        window.onload = loadStudents;
    </script>
</body>
</html>
