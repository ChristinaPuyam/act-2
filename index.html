<!DOCTYPE html>
<html>
<head>
    <title>AWS Student Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px #ccc; width: 350px; vertical-align: top; margin: 10px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff9900; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 95%; }
        button:hover { background: #e68a00; }
        #studentList { text-align: left; margin-top: 20px; }
        .student-card { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Add Student</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="course" placeholder="Course">
        <button onclick="saveStudent()">Add to AWS</button>
    </div>

    <div class="box">
        <h2>Enrolled Students</h2>
        <button onclick="loadStudents()" style="background: #0073bb;">Refresh List</button>
        <div id="studentList">Loading...</div>
    </div>

    <script>
        const API_URL = "https://jikkhwxtyk.execute-api.eu-north-1.amazonaws.com/prod/students";

        async function loadStudents() {
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = "Refreshing...";
            try {
                // The "?t=" part prevents the browser from showing old data
                const response = await fetch(API_URL + "?t=" + Date.now()); 
                const data = await response.json();
                listDiv.innerHTML = data.length === 0 ? "No students found." : 
                    data.map(s => `<div class="student-card"><strong>${s.name}</strong><br>${s.course} | <small>${s.email}</small></div>`).join('');
            } catch (err) {
                listDiv.innerHTML = "Error loading data.";
            }
        }

        async function saveStudent() {
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("Success! Student saved.");
                    document.getElementById('name').value = ""; 
                    document.getElementById('email').value = ""; 
                    document.getElementById('course').value = "";
                    loadStudents(); 
                } else {
                    const errorData = await response.json();
                    alert("Error: " + errorData.error);
                }
            } catch (error) {
                alert("Connection Error. Check CORS and Deploy.");
            }
        }
        window.onload = loadStudents;
    </script>
</body>
</html>
